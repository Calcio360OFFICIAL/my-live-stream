name: Calcio360_Fix_Totale

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb chromium-browser

      - name: Run
        run: |
          # 1. Schermo virtuale 1080p
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          
          # 2. Chromium: forziamo il layout desktop per evitare il QR del sito
          chromium-browser --no-sandbox --disable-setuid-sandbox \
            --window-size=1920,1080 --start-fullscreen \
            --force-device-scale-factor=1 \
            --disable-features=Translate --lang=it-IT \
            --no-first-run --disable-infobars --disable-gpu \
            "https://widgets.thesports01.com/en/3d/football?profile=74rekh26eseunr0&id=4339672" &
          
          sleep 35
          
          # 3. FFmpeg: Massima velocità, immagine rimpicciolita
          # Ho aggiunto 'scale=200:-1' all'immagine per evitare che copra tutto
          ffmpeg -f x11grab -framerate 30 -video_size 1920x1080 -i :99.0 \
          -i "football-stadium-ambience-soccer-crowd-sound-effect-043966459_nw_prev.m4a" -stream_loop -1 \
          -i "Progetto senza titolo (1).png" \
          -filter_complex \
          "[0:v]crop=1500:850:210:100[campo]; \
           [2:v]scale=250:-1[logo_piccolo]; \
           [campo][logo_piccolo]overlay=W-w-50:50" \
          -c:v libx264 -preset ultrafast -tune zerolatency -b:v 4000k -maxrate 4000k -bufsize 8000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}"
