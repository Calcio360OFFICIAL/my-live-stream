name: Start Live Stream

on:
  workflow_dispatch: # Ti permette di far partire la live a mano con un tasto

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Stream
        run: |
          ffmpeg -re -i "football-stadium-ambience-soccer-crowd-soun..." \
          -loop 1 -i "Progetto senza titolo (1).png" \
          -f lavfi -i "color=c=black:s=1920x1080" \
          -filter_complex \
          "[1:v]scale=424:-1[logo];[2:v][logo]overlay=10:720[bg];[bg]drawtext=text='BOLOGNA vs ATALANTA':fontcolor=white:fontsize=40:x=w-tw-50:y=h-th-50" \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/TUA_STREAM_KEY"
